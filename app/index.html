<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1">
  <title>CoBePhim TV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HOME SCREEN -->
<div id="home-screen" class="screen active">
  <div class="navbar">
    <div class="logo">CoBePhim</div>
    <div class="nav-items">
      <div class="nav-item active focused" data-nav="home" data-section="0" data-index="0">Trang Chủ</div>
      <div class="nav-item" data-nav="phim-le" data-section="0" data-index="1">Phim Lẻ</div>
      <div class="nav-item" data-nav="phim-bo" data-section="0" data-index="2">Phim Bộ</div>
      <div class="nav-item" data-nav="hoat-hinh" data-section="0" data-index="3">Hoạt Hình</div>
    </div>
    <div class="search-btn" data-section="0" data-index="4">🔍 Tìm Kiếm</div>
  </div>
  <div class="home-content" id="home-content">
    <div class="loading"><div class="spinner"></div>Đang tải...</div>
  </div>
</div>

<!-- SEARCH SCREEN -->
<div id="search-screen" class="screen">
  <div class="back-btn" id="search-back" data-section="0" data-index="0">← Quay lại</div>
  <div class="search-header">
    <div class="search-input-wrap" data-section="0" data-index="1">
      <span class="search-icon">🔍</span>
      <input id="search-input" type="text" placeholder="Tìm phim..." autocomplete="off">
    </div>
  </div>
  <div class="search-results" id="search-results">
    <div style="color:var(--text2); font-size:24px; width:100%; text-align:center; padding-top:40px">
      Nhập tên phim để tìm kiếm
    </div>
  </div>
</div>

<!-- DETAIL SCREEN -->
<div id="detail-screen" class="screen">
  <div class="back-btn" id="detail-back" data-section="0" data-index="0">← Quay lại</div>
  <div class="detail-backdrop" id="detail-backdrop"></div>
  <div class="detail-content">
    <div class="detail-poster">
      <img id="detail-poster-img" src="" alt="">
    </div>
    <div class="detail-info">
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-origin" id="detail-origin"></div>
      <div class="detail-tags" id="detail-tags"></div>
      <div class="detail-desc" id="detail-desc"></div>
      <div class="episode-section">
        <div class="episode-section-title">Máy chủ &amp; Tập phim</div>
        <div class="server-tabs" id="server-tabs"></div>
        <div class="episode-list" id="episode-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- PLAYER SCREEN -->
<div id="player-screen" class="screen">
  <video id="player-video" playsinline></video>
  <div class="player-overlay" id="player-overlay">
    <div class="player-top">
      <div class="back-btn focused" id="player-back" style="position:static">← Thoát</div>
      <div>
        <div class="player-title" id="player-title"></div>
        <div class="player-ep" id="player-ep"></div>
      </div>
    </div>
    <div class="player-bottom">
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="player-controls">
        <div class="ctrl-btn" id="ctrl-back10" data-section="0" data-index="0">⏪ 10s</div>
        <div class="ctrl-btn" id="ctrl-prev-ep" data-section="0" data-index="1">⏮ Tập trước</div>
        <div class="ctrl-btn play-pause" id="ctrl-play" data-section="0" data-index="2">⏸</div>
        <div class="ctrl-btn" id="ctrl-next-ep" data-section="0" data-index="3">Tập sau ⏭</div>
        <div class="ctrl-btn" id="ctrl-fwd10" data-section="0" data-index="4">10s ⏩</div>
        <div class="player-time" id="player-time">0:00 / 0:00</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script src="app.js"></script>
</body>
</html>
